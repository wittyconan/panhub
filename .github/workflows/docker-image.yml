name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"
            CONTAINER="${{ github.event.repository.name }}"
            ENV_FILE="/opt/1panel/apps/openresty/openresty/www/sites/panhub.shenzjd.com/index/.env"

            echo "=== 登录 GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "=== 拉取最新镜像 ==="
            sudo docker pull "$IMAGE"

            echo "=== 停止旧容器 ==="
            sudo docker stop "$CONTAINER" || true
            sudo docker rm "$CONTAINER" || true

            echo "=== 启动新容器 ==="
            ENV_FLAGS=""
            if [ -f "$ENV_FILE" ]; then
              ENV_FLAGS="--env-file $ENV_FILE"
            fi
            sudo docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              $ENV_FLAGS \
              -p 5253:4000 \
              "$IMAGE"

            echo "=== 清理旧镜像 ==="
            sudo docker image prune -f

            echo "=== 部署完成 ==="
            sudo docker ps | grep "$CONTAINER"
