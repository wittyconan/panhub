  <rect x="373" y="555" width="240" height="50" rx="6" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="493" y="575" fill="white" font-size="11" font-weight="600" text-anchor="middle">PluginHealthChecker</text>
