  <rect x="38" y="250" width="1044" height="418" rx="14" fill="none" stroke="#34d399" stroke-width="1.2" stroke-dasharray="12,4"/>
  <text x="55" y="267" fill="#34d399" font-size="9" font-weight="600">Nuxt 4 Server (Nitro Engine)</text>

  <!-- ==================== Layer 3: API Routes ==================== -->
  <!-- /api/search -->
  <rect x="58" y="280" width="170" height="42" rx="6" fill="#0f172a"/>
  <rect x="58" y="280" width="170" height="42" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="143" y="298" fill="white" font-size="10" font-weight="600" text-anchor="middle">/api/search</text>
  <text x="143" y="314" fill="#94a3b8" font-size="8" text-anchor="middle">GET · POST</text>

  <!-- /api/hot-searches -->
  <rect x="243" y="280" width="195" height="42" rx="6" fill="#0f172a"/>
  <rect x="243" y="280" width="195" height="42" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="340" y="298" fill="white" font-size="10" font-weight="600" text-anchor="middle">/api/hot-searches</text>
  <text x="340" y="314" fill="#94a3b8" font-size="8" text-anchor="middle">GET · POST</text>

  <!-- /api/auth -->
  <rect x="453" y="280" width="145" height="42" rx="6" fill="#0f172a"/>
  <rect x="453" y="280" width="145" height="42" rx="6" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="525" y="298" fill="white" font-size="10" font-weight="600" text-anchor="middle">/api/auth</text>
  <text x="525" y="314" fill="#94a3b8" font-size="8" text-anchor="middle">HMAC Cookie</text>

  <!-- /api/douban-hot -->
  <rect x="613" y="280" width="170" height="42" rx="6" fill="#0f172a"/>
  <rect x="613" y="280" width="170" height="42" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="698" y="298" fill="white" font-size="10" font-weight="600" text-anchor="middle">/api/douban-hot</text>
  <text x="698" y="314" fill="#94a3b8" font-size="8" text-anchor="middle">GET</text>

  <!-- /api/health + /api/img -->
  <rect x="798" y="280" width="262" height="42" rx="6" fill="#0f172a"/>
  <rect x="798" y="280" width="262" height="42" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="929" y="298" fill="white" font-size="10" font-weight="600" text-anchor="middle">/api/health · /api/plugin-health</text>
  <text x="929" y="314" fill="#94a3b8" font-size="8" text-anchor="middle">/api/img (proxy)</text>

  <!-- Auth middleware annotation -->
  <rect x="445" y="328" width="160" height="20" rx="4" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="525" y="342" fill="#fb7185" font-size="8" font-weight="500" text-anchor="middle">requireSearchAuth 中间件</text>

  <!-- Arrow: API → SearchService -->
  <line x1="340" y1="322" x2="340" y2="370" stroke="#34d399" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrow-emerald)"/>
  <line x1="560" y1="322" x2="560" y2="370" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- ==================== Layer 4: SearchService ==================== -->
  <rect x="210" y="370" width="700" height="55" rx="8" fill="#0f172a"/>
  <rect x="210" y="370" width="700" height="55" rx="8" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="2"/>
