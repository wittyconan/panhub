  <rect x="635" y="462" width="220" height="50" rx="6" fill="#0f172a"/>
  <rect x="635" y="462" width="220" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="745" y="482" fill="white" font-size="11" font-weight="600" text-anchor="middle">HotSearch Service</text>
  <text x="745" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">Singleton · 优雅降级</text>

  <!-- Douban Service -->
  <rect x="878" y="462" width="185" height="50" rx="6" fill="#0f172a"/>
  <rect x="878" y="462" width="185" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="970" y="482" fill="white" font-size="11" font-weight="600" text-anchor="middle">Douban Service</text>
