  <rect x="690" y="840" width="250" height="32" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="815" y="860" fill="white" font-size="10" font-weight="600" text-anchor="middle">Docker (node:20-alpine)</text>

