  <path d="M 470 425 L 470 448 L 460 448 L 460 462" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <!-- To HotSearch -->
  <path d="M 640 425 L 640 448 L 700 448 L 700 462" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <!-- To Douban -->
  <path d="M 760 425 L 760 448 L 920 448 L 920 462" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

