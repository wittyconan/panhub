<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 960">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- ==================== Title ==================== -->
  <text x="560" y="28" fill="white" font-size="17" font-weight="700" text-anchor="middle">PanHub 系统架构图</text>
  <text x="560" y="46" fill="#94a3b8" font-size="9" text-anchor="middle">Nuxt 4 · Telegram Channel Aggregator · Multi-Source Cloud Drive Search Engine</text>

  <!-- ==================== Layer 1: Browser ==================== -->
  <rect x="395" y="60" width="330" height="48" rx="6" fill="#0f172a"/>
  <rect x="395" y="60" width="330" height="48" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="560" y="82" fill="white" font-size="12" font-weight="600" text-anchor="middle">用户浏览器</text>
  <text x="560" y="98" fill="#94a3b8" font-size="9" text-anchor="middle">Browser · Vue 3 SPA</text>

  <!-- Arrow: Browser → Client -->
  <line x1="560" y1="108" x2="560" y2="138" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- ==================== Layer 2: Client Layer ==================== -->
  <rect x="55" y="133" width="1010" height="82" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="70" y="149" fill="#22d3ee" font-size="9" font-weight="600">Client Layer 客户端</text>

  <!-- Composables -->
  <rect x="75" y="155" width="290" height="48" rx="6" fill="#0f172a"/>
  <rect x="75" y="155" width="290" height="48" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="220" y="175" fill="white" font-size="11" font-weight="600" text-anchor="middle">Composables</text>
  <text x="220" y="193" fill="#94a3b8" font-size="9" text-anchor="middle">useSearch · useSettings · useAuth</text>

  <!-- UI Components -->
  <rect x="395" y="155" width="280" height="48" rx="6" fill="#0f172a"/>
  <rect x="395" y="155" width="280" height="48" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="535" y="175" fill="white" font-size="11" font-weight="600" text-anchor="middle">UI Components</text>
  <text x="535" y="193" fill="#94a3b8" font-size="9" text-anchor="middle">SearchBox · ResultGroup · HotSearch</text>

  <!-- Search State Machine -->
  <rect x="705" y="155" width="340" height="48" rx="6" fill="#0f172a"/>
  <rect x="705" y="155" width="340" height="48" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="875" y="175" fill="white" font-size="11" font-weight="600" text-anchor="middle">Search State Machine</text>
  <text x="875" y="193" fill="#94a3b8" font-size="9" text-anchor="middle">Fast → Deep · Pause/Resume · p-limit</text>

  <!-- Arrow: Client → API -->
  <line x1="560" y1="215" x2="560" y2="255" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="580" y="240" fill="#64748b" font-size="8">HTTP /api/search</text>

