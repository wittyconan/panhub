  <text x="475" y="482" fill="white" font-size="11" font-weight="600" text-anchor="middle">Plugin Manager</text>
  <text x="475" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">BaseAsyncPlugin · Global Registry</text>

