  <!-- UnifiedCache -->
  <rect x="58" y="555" width="290" height="50" rx="6" fill="#0f172a"/>
  <rect x="58" y="555" width="290" height="50" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
