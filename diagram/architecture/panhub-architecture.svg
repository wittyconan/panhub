  <rect x="435" y="840" width="230" height="32" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="550" y="860" fill="white" font-size="10" font-weight="600" text-anchor="middle">Vercel (Serverless)</text>

