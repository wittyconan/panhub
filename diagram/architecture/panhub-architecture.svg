  <text x="520" y="742" fill="white" font-size="11" font-weight="600" text-anchor="middle">Plugin Sites (~10)</text>
  <text x="520" y="760" fill="#94a3b8" font-size="9" text-anchor="middle">pansearch · qupansou · panta ...</text>

  <!-- Douban API -->
