  <rect x="65" y="462" width="250" height="50" rx="6" fill="#0f172a"/>
  <rect x="65" y="462" width="250" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
