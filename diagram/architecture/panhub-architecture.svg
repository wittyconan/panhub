  <path d="M 475 512 L 475 530 L 35 530 L 35 742 L 475 742 L 475 720" fill="none" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-emerald)"/>
  <!-- Douban → Douban API -->
  <path d="M 970 512 L 970 535 L 1085 535 L 1085 742 L 780 742 L 780 720" fill="none" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-emerald)"/>

