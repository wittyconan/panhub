  <!-- HotSearch Store -->
  <rect x="638" y="555" width="290" height="50" rx="6" fill="#0f172a"/>
  <rect x="638" y="555" width="290" height="50" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="783" y="575" fill="white" font-size="11" font-weight="600" text-anchor="middle">HotSearch Store</text>
  <text x="783" y="593" fill="#94a3b8" font-size="9" text-anchor="middle">JSON File ⇢ Memory (Adapter)</text>

  <!-- ErrorCollector (small) -->
  <rect x="948" y="555" width="115" height="50" rx="6" fill="#0f172a"/>
  <rect x="948" y="555" width="115" height="50" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="1005" y="575" fill="white" font-size="10" font-weight="600" text-anchor="middle">Error</text>
  <text x="1005" y="593" fill="#94a3b8" font-size="9" text-anchor="middle">Collector</text>

